# Schema only — runs on push when migrations change.
# Demo data is NOT re-applied here; use supabase-seed-demo-data.yml (manual, one-off).
#
# Requires SUPABASE_DB_URL or SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD.
name: Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push schema migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: yonkaaylolrdsjfgpvyp
        run: |
          set -euo pipefail

          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "Using SUPABASE_DB_URL — db push only (no seeds)."
            supabase db push --yes --db-url "$SUPABASE_DB_URL"
          elif [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "Using SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD — db push only (no seeds)."
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes
            supabase db push --yes
          else
            echo "::warning title=Supabase credentials not configured::"
            echo "Skipping migrate — no GitHub Actions secrets found."
            echo "Add SUPABASE_DB_URL under Secrets (not Variables):"
            echo "  https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 0
          fi
