name: Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/seed-entities.sql"
      - "supabase/seed-access.sql"
      - "supabase/seed-employees.sql"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: yonkaaylolrdsjfgpvyp
    steps:
      - uses: actions/checkout@v4

      - name: Verify GitHub secrets
        run: |
          missing=0
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing repository secret SUPABASE_ACCESS_TOKEN. Create one at https://supabase.com/dashboard/account/tokens then add it under GitHub → Settings → Secrets and variables → Actions."
            missing=1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing repository secret SUPABASE_DB_PASSWORD. Use your Supabase project database password (Settings → Database → Reset database password if needed)."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Push migrations
        run: supabase db push --yes

      - name: Apply reference data seed
        run: supabase db query --linked -f supabase/seed.sql

      - name: Apply entity seed
        run: supabase db query --linked -f supabase/seed-entities.sql

      - name: Apply employee seed
        run: supabase db query --linked -f supabase/seed-employees.sql

      - name: Apply access seed
        run: supabase db query --linked -f supabase/seed-access.sql
