# Requires ONE of:
#   - SUPABASE_DB_URL (recommended — full Postgres URI from Supabase dashboard)
#   - OR both SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD
name: Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/seed.sql"
      - "supabase/seed-entities.sql"
      - "supabase/seed-access.sql"
      - "supabase/seed-employees.sql"
      - ".github/workflows/supabase-migrate.yml"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Migrate and seed Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: yonkaaylolrdsjfgpvyp
        run: |
          set -euo pipefail

          use_db_url() {
            supabase db push --yes --db-url "$SUPABASE_DB_URL"
            supabase db query --db-url "$SUPABASE_DB_URL" -f supabase/seed.sql
            supabase db query --db-url "$SUPABASE_DB_URL" -f supabase/seed-entities.sql
            supabase db query --db-url "$SUPABASE_DB_URL" -f supabase/seed-employees.sql
            supabase db query --db-url "$SUPABASE_DB_URL" -f supabase/seed-access.sql
          }

          use_link() {
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes
            supabase db push --yes
            supabase db query --linked -f supabase/seed.sql
            supabase db query --linked -f supabase/seed-entities.sql
            supabase db query --linked -f supabase/seed-employees.sql
            supabase db query --linked -f supabase/seed-access.sql
          }

          if [ -n "$SUPABASE_DB_URL" ]; then
            echo "Using SUPABASE_DB_URL."
            use_db_url
          elif [ -n "$SUPABASE_ACCESS_TOKEN" ] && [ -n "$SUPABASE_DB_PASSWORD" ]; then
            echo "Using SUPABASE_ACCESS_TOKEN + SUPABASE_DB_PASSWORD."
            use_link
          else
            echo "::warning title=Supabase credentials not configured::"
            echo "Skipping migrate/seed — no GitHub Actions secrets found for this repository."
            echo ""
            echo "Add ONE repository secret (recommended):"
            echo "  Name:  SUPABASE_DB_URL"
            echo "  Value: Postgres URI from Supabase → Database → Connect → URI (Session pooler, port 5432)"
            echo ""
            echo "Must be under Secrets (not Variables):"
            echo "  https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo ""
            echo "Database is unchanged. This job exits successfully to avoid failure emails."
            exit 0
          fi
