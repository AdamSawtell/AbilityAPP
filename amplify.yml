version: 1
applications:
  - appRoot: web
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            # Amplify console env vars are not always visible to Next.js API routes at runtime.
            # Materialise server + public env into .env.production before `next build`.
            - |
              if [ -z "$AUTH_SESSION_SECRET" ]; then
                echo "ERROR: AUTH_SESSION_SECRET is missing in Amplify environment variables."
                exit 1
              fi
              NODE_OPTIONS_VAL="${NODE_OPTIONS:---max-old-space-size=768}"
              PORTAL_DEMO_VAL="${PORTAL_DEMO_EXPOSE_LINK:-true}"
              APP_URL_VAL="${NEXT_PUBLIC_APP_URL:-https://app.abilityvua.com}"
              cat > .env.production <<EOF
              AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET}
              NEXT_PUBLIC_APP_URL=${APP_URL_VAL}
              NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
              NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
              SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
              AUDIT_CRON_SECRET=${AUDIT_CRON_SECRET}
              OPENAI_API_KEY=${OPENAI_API_KEY}
              NODE_OPTIONS=${NODE_OPTIONS_VAL}
              PORTAL_DEMO_EXPOSE_LINK=${PORTAL_DEMO_VAL}
              NEXT_PUBLIC_VAPID_PUBLIC_KEY=${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
              VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
              VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
              VAPID_SUBJECT=${VAPID_SUBJECT}
              EOF
              echo "Wrote .env.production for Next.js (AUTH_SESSION_SECRET length: ${#AUTH_SESSION_SECRET})"
        build:
          commands:
            # The runtime SSR Lambda is capped low (NODE_OPTIONS=768 MB), but `next build`
            # webpack-compiles 170+ routes and OOMs at that cap. Give the build its own high
            # heap inline so it does not inherit the runtime limit. Does not affect runtime.
            - NODE_OPTIONS="--max-old-space-size=4096" npm run build
            # Shrink compute bundle — frees memory for Chromium PDF at runtime (Amplify SSR limit ~220 MB).
            - rm -f node_modules/@swc/core-linux-x64-gnu/swc.linux-x64-gnu.node || true
            - rm -f node_modules/@swc/core-linux-x64-musl/swc.linux-x64-musl.node || true
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
